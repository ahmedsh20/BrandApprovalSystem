{% extends "base.html" %}

{% block title %}
Manage Admin
{% endblock %}

{% block navbar %}

<a class="nav-link text-white" href="/admin/manage-admins">
    ⬅ <span class="nav-text">Back</span>
</a>

<a class="nav-link text-white" href="/logout">
    🚪 <span class="nav-text">Logout</span>
</a>

{% endblock %}

{% block content %}

<div class="container" style="max-width:600px;">

<div class="card shadow">

<div class="card-body">

<h2 class="mb-4">

Manage Admin

</h2>

<form method="POST">

<div class="mb-3">

<label class="form-label">

Username

</label>

<input
type="text"
class="form-control"
value="{{ admin.username }}"
style="font-weight: bold; color: black;"
disabled>

</div>

<div class="form-check mb-3">

<input
class="form-check-input"
type="checkbox"
name="can_review"
id="review"
{% if admin.can_review %}checked{% endif %}>

<label class="form-check-label" for="review">

Can Accept/Reject
</label>

</div>

<div class="form-check mb-3">

<input
class="form-check-input"
type="checkbox"
name="can_edit"
id="edit"
{% if admin.can_edit %}checked{% endif %}>

<label class="form-check-label" for="edit">

Can Edit Decisions

</label>

</div>

<div class="form-check mb-4">

<input
class="form-check-input"
type="checkbox"
name="active"
id="active"
{% if admin.active %}checked{% endif %}>

<label class="form-check-label" for="active">

Account Active

</label>

</div>

<div class="text-center mt-4">
    <button class="btn btn-success">

        Save Changes

    </button>
</div>
</form>

</div>

</div>

</div>

{% endblock %}
